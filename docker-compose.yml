version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: donghn
      POSTGRES_PASSWORD: "Work19293949?"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donghn -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.12
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  org-service:
    build: ./backend/org-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://donghn:Work19293949%3F@postgres:5432/crm
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    ports:
      - "4001:4001"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import json,urllib.request as u; req=u.Request('http://localhost:4001/graphql', data=json.dumps({'query':'{__typename}'}).encode(), headers={'Content-Type':'application/json'}); u.urlopen(req)\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  crm-service:
    build: ./backend/crm-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://donghn:Work19293949%3F@postgres:5432/crm
      KAFKA_BROKERS: redpanda:9092
      ORG_SERVICE_URL: http://org-service:4001/graphql
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      org-service:
        condition: service_started
    ports:
      - "4002:4002"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import json,urllib.request as u; req=u.Request('http://localhost:4002/graphql', data=json.dumps({'query':'{__typename}'}).encode(), headers={'Content-Type':'application/json'}); u.urlopen(req)\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  review-worker:
    build: ./backend/review-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://donghn:Work19293949%3F@postgres:5432/crm
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  gateway:
    build: ./backend/gateway
    restart: unless-stopped
    environment:
      ORG_SUBGRAPH_URL: http://org-service:4001/graphql
      CRM_SUBGRAPH_URL: http://crm-service:4002/graphql
    depends_on:
      org-service:
        condition: service_healthy
      crm-service:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build: ./frontend/web
    restart: unless-stopped
    environment:
      VITE_GATEWAY_URL: http://localhost:4000/graphql
    depends_on:
      - gateway
    ports:
      - "3000:3000"

volumes:
  pgdata:
